<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Book</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <div class="form-card">
        <h1>➕ Add a Book</h1>

        <form method="POST">

            <div class="form-group">
                <label for="book_name">Book Name</label>
                <input type="text" id="book_name" name="book_name" placeholder="e.g. The Great Gatsby" required>
            </div>

            <div class="form-group">
                <label for="book_author">Author</label>
                <input type="text" id="book_author" name="book_author" placeholder="e.g. F. Scott Fitzgerald" required>
            </div>

            <div class="form-group">
                <label for="book_rating">Rating (0 – 10)</label>
                <input type="number" id="book_rating" name="book_rating" step="0.1" min="0" max="10" placeholder="e.g. 8.5" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Add Book</button>
                <a href="{{ url_for('home') }}" class="btn btn-outline">← Back</a>
            </div>

        </form>
    </div>
</div>

</body>
</html>
